name: ⚡ Fast Deploy (No Tests)

on:
  workflow_dispatch:
    # Pouze ruční spuštění — automatický deploy z claude/** zakázán
    # Produkce se deployuje výhradně z main větve (deploy.yml)

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: ⚡ Fast Deploy via SFTP

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🗜️ Create deployment package (exclude large files)
        run: |
          echo "📦 Creating deployment package..."
          # Create temporary directory
          mkdir -p /tmp/deploy

          # Copy only necessary files (exclude .git, tests, backups)
          rsync -av --progress \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='vendor/' \
            --exclude='tests/' \
            --exclude='backups/' \
            --exclude='.gitignore' \
            --exclude='.env.example' \
            --exclude='README.md' \
            --exclude='CLAUDE.md' \
            --exclude='*.md' \
            ./ /tmp/deploy/

          echo "✅ Deployment package created ($(du -sh /tmp/deploy | cut -f1))"

      - name: 🚀 Deploy to Český hosting via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_HOST }}
          port: 22
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: "/tmp/deploy/"
          remote_path: "wgs-service.cz/www/"
          sftp_only: true
          delete_remote_files: false

      - name: ✅ Deployment summary
        run: |
          echo "⚡ Fast deployment completed!"
          echo "📦 Branch: ${{ github.ref_name }}"
          echo "💾 Commit: ${{ github.sha }}"
          echo "⏰ Time: $(date)"
