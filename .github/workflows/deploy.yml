name: ⚡ ULTRA RYCHLÝ Deploy (2 min)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ultra-fast-deploy:
    runs-on: ubuntu-latest
    name: ⚡ Deploy BEZ testů

    steps:
      - name: 📥 Checkout (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # Jen poslední commit = rychlejší

      - name: Nastavení Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalace závislostí a build
        run: |
          npm ci --prefer-offline
          npm run build

      - name: 🚀 SFTP Deploy (optimalizovaný)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          protocol: ftps
          port: 21
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /wgs-service.cz/www/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/**
            **/tests/**
            **/test/**
            **/.github/**
            **/.vscode/**
            **/README.md
            **/CONTRIBUTING.md
            **/CLAUDE.md
            **/LICENSE
            **/*.log
            **/phpunit.xml
            **/composer.lock
            **/.env.example
            **/temp/**
            **/backups/**
            **/migrations/**
            **/uploads/screens

      - name: ✅ Hotovo!
        run: |
          echo "⚡ Deploy dokončen!"
          echo "🕐 Čas: ~2 minuty (bez testů)"
