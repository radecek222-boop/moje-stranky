name: E2E testy (Playwright)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E testy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: ''
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: wgs_test
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 3306:3306

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Nastavit PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_mysql, mbstring, json, curl, fileinfo
          coverage: none

      - name: Nastavit Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Nainstalovat závislosti
        run: npm ci

      - name: Nainstalovat Playwright prohlížeče
        run: npx playwright install chromium --with-deps

      - name: Vytvořit testovací .env
        run: |
          cat > .env << 'EOF'
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_NAME=wgs_test
          DB_USER=root
          DB_PASS=
          SMTP_HOST=localhost
          SMTP_PORT=25
          SMTP_FROM=test@test.cz
          SMTP_USER=
          SMTP_PASS=
          JWT_SECRET=testovaci-jwt-secret-pro-ci-32chars
          ADMIN_KEY_HASH=test
          ENVIRONMENT=test
          EOF

      - name: Nastavit práva adresářů
        run: |
          chmod 777 logs/ temp/ uploads/ 2>/dev/null || true
          mkdir -p logs temp uploads
          chmod 777 logs temp uploads

      - name: Vytvořit minimální DB schéma
        run: |
          mysql -h 127.0.0.1 -u root wgs_test << 'SQL'
          CREATE TABLE IF NOT EXISTS wgs_tenants (
            tenant_id INT AUTO_INCREMENT PRIMARY KEY,
            slug VARCHAR(100) NOT NULL UNIQUE,
            nazev VARCHAR(255) NOT NULL,
            domena VARCHAR(255),
            nastaveni_json TEXT,
            je_aktivni TINYINT(1) DEFAULT 1,
            datum_vytvoreni DATETIME DEFAULT CURRENT_TIMESTAMP
          );
          INSERT IGNORE INTO wgs_tenants (tenant_id, slug, nazev, domena, je_aktivni)
            VALUES (1, 'default', 'WGS Service', NULL, 1);
          SQL

      - name: Spustit PHP dev server na pozadí
        run: |
          php -S localhost:8080 -t . > /tmp/php-server.log 2>&1 &
          echo "PHP server PID: $!"
          sleep 3
          curl -s -o /dev/null -w "Health check HTTP: %{http_code}\n" http://localhost:8080/health.php || echo "Health check selhal (pokracujeme)"

      - name: Spustit E2E testy
        run: npx playwright test
        env:
          BASE_URL: http://localhost:8080
          CI: true

      - name: Zobrazit PHP server log při selhání
        if: failure()
        run: cat /tmp/php-server.log || true

      - name: Nahrát Playwright report při selhání
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Nahrát snímky obrazovky při selhání
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 7
