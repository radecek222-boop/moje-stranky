name: E2E testy (Playwright)

on:
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E testy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: ""
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
          MARIADB_DATABASE: wgs_test
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -u root --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=6
        ports:
          - 3306:3306

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Nastavit PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_mysql, mbstring, json, curl, fileinfo, redis
          coverage: none

      - name: Nastavit Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Nainstalovat závislosti
        run: npm ci

      - name: Nainstalovat Playwright prohlížeče
        run: npx playwright install chromium --with-deps

      - name: Vytvořit testovací .env
        run: |
          cat > .env <<'ENVEOF'
DB_HOST=127.0.0.1
DB_PORT=3306
DB_NAME=wgs_test
DB_USER=root
DB_PASS=
SMTP_HOST=localhost
SMTP_PORT=25
SMTP_FROM=test@test.cz
SMTP_USER=
SMTP_PASS=
JWT_SECRET=testovaci-jwt-secret-pro-ci-32chars
ADMIN_KEY_HASH=test
ENVIRONMENT=test
ENVEOF

      - name: Nastavit práva adresářů
        run: |
          mkdir -p logs temp uploads
          chmod 777 logs temp uploads

      - name: Vytvořit minimální DB schéma (PHP)
        run: |
          php -r "
          \$pdo = new PDO('mysql:host=127.0.0.1;dbname=wgs_test;charset=utf8mb4', 'root', '', [
              PDO::ATTR_ERRMODE => PDO::ERRMODE_EXCEPTION
          ]);
          \$pdo->exec(\"CREATE TABLE IF NOT EXISTS wgs_tenants (
              tenant_id INT AUTO_INCREMENT PRIMARY KEY,
              slug VARCHAR(100) NOT NULL UNIQUE,
              nazev VARCHAR(255) NOT NULL,
              domena VARCHAR(255),
              nastaveni_json TEXT,
              je_aktivni TINYINT(1) DEFAULT 1,
              datum_vytvoreni DATETIME DEFAULT CURRENT_TIMESTAMP
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4\");
          \$pdo->exec(\"INSERT IGNORE INTO wgs_tenants (tenant_id, slug, nazev, je_aktivni)
              VALUES (1, 'default', 'WGS Service', 1)\");
          echo 'DB schema OK' . PHP_EOL;
          "

      - name: Spustit PHP dev server na pozadí
        run: |
          php -S localhost:8080 -t . > /tmp/php-server.log 2>&1 &
          echo "PHP server PID: $!"
          sleep 3
          curl -s -o /dev/null -w "Health check HTTP: %{http_code}\n" http://localhost:8080/health.php || echo "Health check selhal (pokracujeme)"

      - name: Spustit E2E testy
        run: npx playwright test
        env:
          BASE_URL: http://localhost:8080
          CI: true

      - name: Zobrazit PHP server log při selhání
        if: failure()
        run: cat /tmp/php-server.log || true

      - name: Nahrát Playwright report při selhání
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Nahrát snímky obrazovky při selhání
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 7
